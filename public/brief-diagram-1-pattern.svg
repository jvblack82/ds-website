<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 940 200" xmlns="http://www.w3.org/2000/svg" font-family="Plus Jakarta Sans, system-ui, sans-serif" role="img" aria-label="Your expert's judgment is trained into AI, which then produces expert work at scale">
          <defs>
            <marker id="d1arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#B5895A"/></marker>
          </defs>
          <rect x="20" y="50" width="252" height="100" rx="12" fill="#FFFFFF" stroke="#E7DECF" stroke-width="1.5"/>
          <text x="146" y="93" text-anchor="middle" font-size="18" font-weight="600" fill="#1E2B3A">Your expert's judgment</text>
          <text x="146" y="119" text-anchor="middle" font-size="13.5" fill="#8A7E70">20 years in one person's head</text>
          <line x1="280" y1="100" x2="336" y2="100" stroke="#B5895A" stroke-width="2.5" marker-end="url(#d1arr)"/>
          <text x="308" y="84" text-anchor="middle" font-size="12" fill="#8A7E70">train</text>
          <rect x="344" y="50" width="252" height="100" rx="12" fill="#1E2B3A"/>
          <text x="470" y="93" text-anchor="middle" font-size="18" font-weight="600" fill="#FFFFFF">AI trained to do it</text>
          <text x="470" y="119" text-anchor="middle" font-size="13.5" fill="#FFFFFF" fill-opacity="0.7">with checks for where it slips</text>
          <line x1="604" y1="100" x2="660" y2="100" stroke="#B5895A" stroke-width="2.5" marker-end="url(#d1arr)"/>
          <text x="632" y="84" text-anchor="middle" font-size="12" fill="#8A7E70">scale</text>
          <rect x="668" y="50" width="252" height="100" rx="12" fill="#FFFFFF" stroke="#E7DECF" stroke-width="1.5"/>
          <text x="794" y="93" text-anchor="middle" font-size="18" font-weight="600" fill="#1E2B3A">Expert work, on tap</text>
          <text x="794" y="119" text-anchor="middle" font-size="13.5" fill="#8A7E70">days, not months</text>
        </svg>
