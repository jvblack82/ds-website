<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 940 285" xmlns="http://www.w3.org/2000/svg" font-family="Plus Jakarta Sans, system-ui, sans-serif" role="img" aria-label="A loop: AI does the work, you say what is wrong in plain words, the change is versioned and past cases re-run, it flags its own uncertainty, and the loop repeats. Every cycle makes it sharper.">
          <defs>
            <marker id="d5arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#B5895A"/></marker>
          </defs>
          <rect x="8" y="22" width="200" height="92" rx="12" fill="#1E2B3A"/>
          <text x="108" y="74" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">AI does the work</text>
          <rect x="248" y="22" width="200" height="92" rx="12" fill="#FFFFFF" stroke="#E7DECF" stroke-width="1.5"/>
          <text x="348" y="64" text-anchor="middle" font-size="15" font-weight="600" fill="#1E2B3A">You say what's wrong</text>
          <text x="348" y="86" text-anchor="middle" font-size="12.5" fill="#8A7E70">plain words, not code</text>
          <rect x="488" y="22" width="200" height="92" rx="12" fill="#FFFFFF" stroke="#E7DECF" stroke-width="1.5"/>
          <text x="588" y="64" text-anchor="middle" font-size="15" font-weight="600" fill="#1E2B3A">Versioned, re-run</text>
          <text x="588" y="86" text-anchor="middle" font-size="12.5" fill="#8A7E70">past cases checked again</text>
          <rect x="728" y="22" width="200" height="92" rx="12" fill="#FFFFFF" stroke="#E7DECF" stroke-width="1.5"/>
          <text x="828" y="64" text-anchor="middle" font-size="15" font-weight="600" fill="#1E2B3A">It flags doubt</text>
          <text x="828" y="86" text-anchor="middle" font-size="12.5" fill="#8A7E70">asks instead of bluffing</text>
          <line x1="212" y1="68" x2="244" y2="68" stroke="#B5895A" stroke-width="2.5" marker-end="url(#d5arr)"/>
          <line x1="452" y1="68" x2="484" y2="68" stroke="#B5895A" stroke-width="2.5" marker-end="url(#d5arr)"/>
          <line x1="692" y1="68" x2="724" y2="68" stroke="#B5895A" stroke-width="2.5" marker-end="url(#d5arr)"/>
          <path d="M828,114 L828,182 Q828,198 812,198 L124,198 Q108,198 108,182 L108,120" fill="none" stroke="#B5895A" stroke-width="2.5" marker-end="url(#d5arr)"/>
          <text x="468" y="252" text-anchor="middle" font-size="25" font-weight="700" fill="#B5895A">Every cycle makes it sharper.</text>
        </svg>
